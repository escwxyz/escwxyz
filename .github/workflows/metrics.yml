# For a full list of options see:
# https://github.com/lowlighter/metrics/blob/master/action.yml
name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 23 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}


          # options
          template: classic
          plugin_traffic: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_ignored: yaml, markdown, shell, javascript, html, css, sass, dockerfile, makefile, cmake, handlebars, ruby, toml
          plugin_languages_details: percentage
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors
          plugin_wakatime_languages_ignored: yaml, markdown, shell, javascript, html, css, sass, dockerfile, makefile, cmake, handlebars, ruby, toml
          plugin_wakatime_token: ${{ secrets.WAKATIME_API }}

